app-id: com.automattic.beeper
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: com.automattic.beeper
separate-locales: false

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

  # Networking
  - --share=network

  # GPU acceleration
  - --device=dri

  # Audio
  - --socket=pulseaudio

  # File access
  - --filesystem=xdg-download

  # Cursor theme passthrough
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

  # theme passthrough
  - --filesystem=xdg-config/gtk-3.0:ro
  - --filesystem=xdg-config/gtk-4.0:ro
  - --filesystem=xdg-data/themes:ro
  - --filesystem=~/.themes:ro

  # dconf / GSettings access
  - --filesystem=xdg-run/dconf:ro
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_PROFILE=user

  # D-Bus: notifications & tray
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar

  # D-Bus: credential storage (keychain)
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6

  # D-Bus: screen saver / power management
  - --talk-name=org.freedesktop.ScreenSaver
  - --system-talk-name=org.freedesktop.UPower
  - --system-talk-name=org.freedesktop.login1

modules:
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: beeper
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra          ${FLATPAK_DEST}/bin/apply_extra
      - install -Dm755 com.automattic.beeper.sh ${FLATPAK_DEST}/bin/${FLATPAK_ID}
      - install -Dm644 com.automattic.beeper.desktop
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 com.automattic.beeper.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 com.automattic.beeper.png
          ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png

      - desktop-file-edit --set-icon="${FLATPAK_ID}"
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-key="Exec" --set-value="${FLATPAK_ID} %U"
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

    sources:
      - type: file
        path: apply_extra

      - type: file
        path: com.automattic.beeper.sh

      - type: file
        path: com.automattic.beeper.desktop

      - type: file
        path: com.automattic.beeper.metainfo.xml

      - type: file
        path: com.automattic.beeper.png

      # x86_64 AppImage
      - type: extra-data
        filename: beeper.AppImage
        only-arches: [x86_64]
        url: https://beeper-desktop.download.beeper.com/builds/Beeper-4.2.808-x86_64.AppImage
        sha256: aa5e5690a5604222881e434a77cd39c457b3b2fa16fbc76a5f1e8ccdfb3171e3
        size: 236292417
        x-checker-data:
          type: rotating-url
          url: https://api.beeper.com/desktop/download/linux/x64/stable/com.automattic.beeper.desktop
          pattern: https://beeper-desktop.download.beeper.com/builds/Beeper-([0-9.]+)-x86_64.AppImage

      # aarch64 AppImage
      - type: extra-data
        filename: beeper.AppImage
        only-arches: [aarch64]
        url: https://beeper-desktop.download.beeper.com/builds/Beeper-4.2.808-arm64.AppImage
        sha256: 77b129f820a83ddf5fe63badea615c9c4529dc30ee40078e3189e0a6a2b363e5
        size: 239466224
        x-checker-data:
          type: rotating-url
          url: https://api.beeper.com/desktop/download/linux/arm64/stable/com.automattic.beeper.desktop
          pattern: https://beeper-desktop.download.beeper.com/builds/Beeper-([0-9.]+)-arm64.AppImage
