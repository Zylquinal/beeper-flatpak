name: Build & Release Flatpak

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install flatpak & flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-${{ matrix.arch }}-25.08
          restore-keys: flatpak-runtimes-${{ matrix.arch }}-

      - name: Install runtime & BaseApp
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Cache flatpak-builder state
        uses: actions/cache@v4
        with:
          path: .flatpak-builder/cache
          key: flatpak-builder-${{ matrix.arch }}-${{ hashFiles('com.automattic.beeper.yml', 'shared-modules/**') }}
          restore-keys: flatpak-builder-${{ matrix.arch }}-

      - name: Build into local repo
        run: |
          flatpak-builder \
            --user \
            --install-deps-from=flathub \
            --force-clean \
            --repo=repo \
            build-dir \
            com.automattic.beeper.yml

      - name: Create .flatpak bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          flatpak build-bundle repo \
            com.automattic.beeper-${VERSION}-${{ matrix.arch }}.flatpak \
            com.automattic.beeper

      - name: Upload bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: com.automattic.beeper-*-${{ matrix.arch }}.flatpak
